<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Desktop Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app">
    <div class="search-container">
      <input type="text" id="markdown-input" placeholder="Caminho do arquivo .md  ex: /home/user/arquivo.md" autofocus>
      <button id="open-btn" title="Abrir arquivo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
    </div>

    <main id="viewer" class="paper">



      <div id="render-area"></div>
    </main>
  </div>
  <script type="module" src="/main.ts"></script>
</body>

</html>
