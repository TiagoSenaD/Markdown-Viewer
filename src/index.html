<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Desktop Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <span class="sidebar-title">Arquivos</span>
        </div>

        <div class="sidebar-input-group">
          <input
            type="text"
            id="path-input"
            placeholder="Caminho da pasta ou arquivo..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="load-btn" title="Carregar">
            <!-- Folder icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>

        <ul id="file-list">
          <li class="file-list-empty">Nenhum arquivo carregado</li>
        </ul>
      </div>

      <!-- Botão toggle flutuante na borda direita da sidebar -->
      <button id="toggle-btn" title="Recolher sidebar">
        <svg id="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="viewer">
      <div id="render-area">
        <p class="placeholder-text">
          Insira o caminho de uma pasta ou arquivo <code>.md</code> na sidebar para começar.
        </p>
      </div>
    </main>

  </div>

  <script type="module" src="/main.ts"></script>
</body>

</html>
